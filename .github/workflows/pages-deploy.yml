name: Deploy Pages

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: pages-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & deploy Next.js to Cloudflare Pages
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Guard: pages-deploy only makes sense after web/ exists. Until Week 3
      # we don't have a Next.js app yet — skip cleanly instead of failing.
      - name: Check that web/ exists
        id: check_web
        working-directory: ${{ github.workspace }}
        run: |
          if [ -f web/package.json ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::No web/package.json found — skipping Pages deploy."
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node.js
        if: steps.check_web.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        if: steps.check_web.outputs.exists == 'true'
        run: npm install --no-audit --no-fund

      - name: Build (Cloudflare Pages adapter)
        if: steps.check_web.outputs.exists == 'true'
        run: npx @cloudflare/next-on-pages@latest

      - name: Deploy to Cloudflare Pages
        if: steps.check_web.outputs.exists == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: web
          command: pages deploy .vercel/output/static --project-name=suvform
