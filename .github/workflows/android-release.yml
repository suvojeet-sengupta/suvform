name: Android Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build, sign & release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Decode google-services.json
        if: ${{ env.GOOGLE_SERVICES_JSON != '' }}
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          echo "$GOOGLE_SERVICES_JSON" | base64 -d > app/google-services.json

      - name: Decode release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::KEYSTORE_BASE64 secret is missing — cannot produce a signed release."
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > app/suvform.jks

      - name: Build release APK & AAB
        env:
          KEYSTORE_FILE: ${{ github.workspace }}/app/suvform.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          VERSION_CODE: ${{ github.run_number }}
          VERSION_NAME: 1.0.${{ github.run_number }}
        run: |
          ./gradlew \
            "-PversionCode=${VERSION_CODE}" \
            "-PversionName=${VERSION_NAME}" \
            assembleRelease bundleRelease --no-daemon --stacktrace

      - name: Rename artifacts
        run: |
          mkdir -p artifacts
          cp app/build/outputs/apk/release/app-release.apk \
             "artifacts/SuvForm-1.0.${{ github.run_number }}.apk"
          cp app/build/outputs/bundle/release/app-release.aab \
             "artifacts/SuvForm-1.0.${{ github.run_number }}.aab"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: suvform-release-${{ github.run_number }}
          path: artifacts/
          retention-days: 30

      - name: Clean up keystore + google-services
        if: always()
        run: |
          rm -f app/suvform.jks app/google-services.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: SuvForm v1.0.${{ github.run_number }}
          body: |
            Automated release built from `${{ github.sha }}`.

            Triggered by: `${{ github.event_name }}` on `${{ github.ref_name }}`
            Build number: `${{ github.run_number }}`
          files: |
            artifacts/SuvForm-1.0.${{ github.run_number }}.apk
            artifacts/SuvForm-1.0.${{ github.run_number }}.aab
          fail_on_unmatched_files: true
          generate_release_notes: true
