name = "suvform-api"
main = "src/index.ts"
compatibility_date = "2026-05-23"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

[observability.logs]
enabled = false
invocation_logs = true

# D1 database binding — create with:
#   npx wrangler d1 create suvform-db
# Then paste the database_id below.
[[d1_databases]]
binding = "DB"
database_name = "suvform-db"
database_id = "d0fad72e-2532-44ec-b452-6a42c2df0a8d"
migrations_dir = "migrations"

# Rate-limit storage (per-IP submission throttling, AI quota)
[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "d5f6ce598ee147d8830d0ca2616f449a"

# Secrets set via `npx wrangler secret put NAME`:
#   FIREBASE_PROJECT_ID  → your Firebase project ID (e.g. suvform-xxxxx)
#   GEMINI_API_KEY       → Google AI Studio Gemini key (free tier)
